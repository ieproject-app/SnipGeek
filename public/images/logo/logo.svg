<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="sg-mask">
      <rect width="100" height="100" fill="white" />
      <text
        x="50%"
        y="50%"
        dominant-baseline="central"
        text-anchor="middle"
        fill="black"
        style="font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 52px;"
      >
        SG
      </text>
    </mask>
  </defs>
  
  <!-- Menggunakan rx="22" untuk sudut yang membulat sempurna (soft look) -->
  <rect
    width="100"
    height="100"
    rx="22"
    ry="22"
    fill="#7DD3FC"
    mask="url(#sg-mask)"
  />
</svg>