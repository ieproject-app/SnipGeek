# Konfigurasi resmi untuk Firebase App Hosting
kind: "AppHostingYaml"
schemaVersion: "v1"

# Memaksa Firebase untuk mengambil variabel dari Dashboard selama proses Build (Next.js)
env:
  - variable: NEXT_PUBLIC_FIREBASE_WEBAPP_CONFIG
    # Ambil nilai dari variabel 'super' yang disediakan sistem App Hosting
    value: "{{.System.FirebaseWebAppConfig}}"
    availability: ["BUILD", "RUNTIME"]
