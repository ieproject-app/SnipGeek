
kind: "apphosting.yaml"
version: "v1"

# Menjelaskan kepada Firebase App Hosting variabel apa saja yang harus dibawa
# saat proses perakitan (Build) agar Next.js bisa membacanya.
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
