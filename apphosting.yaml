# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure
runConfig:
  minInstances: 0
  maxInstances: 100
  cpu: 1
  memoryMiB: 1024
  concurrency: 80
  # Keep the instance alive for the specified duration after it has finished
  # processing all requests. This duration is capped at 10 minutes.
  # For example: "10m", "5s".
  # You can also set this to 0 to have the instance shut down immediately
  # after it has finished processing all requests.
  instanceIdleTimeout: 5m
# Automatically build and deploy your app from a source repository.
build:
  # The command to run to build your app.
  run: npm run build
# Serve a static Next.js application.
# This should be the output of `next export` or a directory with a
# similar structure.
# https://nextjs.org/docs/pages/building-your-application/deploying/static-exports
#serve:
#  # The directory that contains the static assets to be deployed.
#  # This is relative to your repository root.
#  staticDirectory: out
# Serve a Next.js application with server-side rendering (SSR).
# https://nextjs.org/docs/pages/building-your-application/deploying
serve:
  # The command to run to start your app.
  run: npm run start
